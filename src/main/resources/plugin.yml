name: LifeCore
version: 1.5
main: de.felix.lifeplugin.Main
api-version: 1.21
author: Felixwrn

commands:
  lifecore:
    description: Main command
    usage: /lifecore reload
  language:
    description: Change or download language
    usage: /language <lang> | /language download <lang>
  langgui:
    description: opens language GUI
    aliases: [lg, lang]
  livesgui:
    description: Open lives GUI
    aliases: [lives, leben]

permissions:
  lifeplugin.admin:
    description: Erlaubt Mode Änderungen
    default: op
